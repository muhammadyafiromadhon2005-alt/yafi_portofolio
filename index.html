<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Yafi | Elite Web3 Dev</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box}

body{
  font-family:Poppins;
  background:#04040a;
  color:white;
  overflow-x:hidden;
  cursor:none;
}

/* LOADER */
#loader{
  position:fixed;
  width:100%;
  height:100vh;
  background:black;
  display:flex;
  align-items:center;
  justify-content:center;
  z-index:999;
  font-family:Orbitron;
}

/* CUSTOM CURSOR */
.cursor{
  width:15px;
  height:15px;
  border:2px solid #00f7ff;
  border-radius:50%;
  position:fixed;
  pointer-events:none;
  transform:translate(-50%,-50%);
}

/* HEADER */
header{
  position:fixed;
  width:100%;
  display:flex;
  justify-content:space-between;
  padding:20px 50px;
  background:rgba(0,0,0,0.3);
  backdrop-filter:blur(10px);
  z-index:10;
}

header h1{
  font-family:Orbitron;
  color:#00f7ff;
}

nav a{
  margin-left:20px;
  color:white;
  text-decoration:none;
}

/* HERO */
.hero{
  height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  text-align:center;
}

.hero h1{
  font-size:70px;
  font-family:Orbitron;
  background:linear-gradient(90deg,#00f7ff,#8a2be2);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}

.btn{
  padding:12px 25px;
  margin-top:20px;
  border:none;
  border-radius:30px;
  background:linear-gradient(90deg,#00f7ff,#8a2be2);
  cursor:pointer;
}

/* GRID BG */
.grid{
  position:fixed;
  width:100%;
  height:100%;
  background:linear-gradient(#0f0f1a 1px,transparent 1px),
             linear-gradient(90deg,#0f0f1a 1px,transparent 1px);
  background-size:40px 40px;
  opacity:0.1;
  z-index:-2;
}
/* CHAINERS WEB FARM */
.wallet-card{
  max-width:350px;
  margin:40px auto;
  padding:20px;
  border-radius:20px;
  background:rgba(255,255,255,0.08);
  backdrop-filter:blur(15px);
  box-shadow:0 0 20px #00f7ff30;
}

.token{
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:10px 0;
  border-bottom:1px solid rgba(255,255,255,0.1);
}

.token:last-child{
  border-bottom:none;
}

.icon{
  width:40px;
  height:40px;
  display:flex;
  align-items:center;
  justify-content:center;
  border-radius:10px;
  margin-right:10px;
  font-size:18px;
}

/* warna tiap token */
.scfb{background:#3cff00;}
.pol{background:#7b3cff;}
.bnb{background:#ffb300;}
/*Hover*/
  .wallet-card:hover{
  box-shadow:0 0 30px #00f7ff;
  transform:scale(1.03);
  transition:0.3s;
}
  
/* SECTION */
section{
  padding:120px 10%;
  text-align:center;
}

/* PROJECT */
.cards{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
  gap:20px;
}

.card{
  padding:25px;
  border-radius:20px;
  background:rgba(255,255,255,0.05);
  transition:.3s;
}

.card:hover{
  transform:scale(1.05);
  box-shadow:0 0 25px #00f7ff;
}

/* FOOTER */
footer{
  padding:30px;
  text-align:center;
  background:#000;
}
</style>
</head>

<body>

<div id="loader">LOADING...</div>
<div class="cursor" id="cursor"></div>
<div class="grid"></div>

<header>
  <h1>YAFI</h1>
  <nav>
    <a href="#home">Home</a>
    <a href="#projects">Projects</a>
    <a href="#github">GitHub</a>
  </nav>
</header>

<section class="hero" id="home">
  <h1>Elite Web3 Dev</h1>
  <p>AI • Blockchain • Futuristic Systems</p>
  <button class="btn" onclick="scrollToSection('projects')">Explore</button>
</section>

<section id="wallet">
  <h2>Chainers Web Farm</h2>

  <div class="wallet-card">
    <div class="token">
      <div class="icon scfb">💵</div>
      <div>
        <h3>11.0672 $CFB</h3>
      </div>
    </div>

    <div class="token">
  <div class="icon pol">
    <img src="Polygon_Icon.svg" alt="POL Logo" width="24" height="24">
  </div>
  <div>
    <h3>0 $POL</h3>
  </div>
</div>

     <div class="token">
  <div class="icon pol">
    <img src="bnb-svgrepo-com.svg" alt="BNB Logo" width="24" height="24">
  </div>
  <div>
    <h3>0.00000168 $BNB</h3>
  </div>
</div>

</section>
  
<section id="projects">
  <h2>Projects</h2>
  <div class="cards">
    <div class="card">Web3 Portfolio</div>
    <div class="card">AI Automation</div>
    <div class="card">3D Game Dev</div>
  </div>
</section>

<section id="github">
  <h2>GitHub Live Projects</h2>
  <div class="cards" id="repoList"></div>
</section>

<footer>
  <p>© 2026 Yafi Elite Web3</p>
</footer>

<script>

// LOADER
window.onload = () => {
  document.getElementById('loader').style.display='none'
}

// SCROLL
function scrollToSection(id){
  document.getElementById(id).scrollIntoView({behavior:'smooth'})
}

// CUSTOM CURSOR
const cursor = document.getElementById('cursor')
document.addEventListener('mousemove', e=>{
  cursor.style.left = e.clientX+'px'
  cursor.style.top = e.clientY+'px'
})

// GITHUB FETCH (REAL DATA)
fetch('https://api.github.com/users/muhammadyafiromadhon2005-alt/repos')
.then(res=>res.json())
.then(data=>{
  const repoList=document.getElementById('repoList')
  data.slice(0,6).forEach(repo=>{
    repoList.innerHTML += `
      <div class="card">
        <h3>${repo.name}</h3>
        <p>${repo.description || 'No description'}</p>
        <a href="${repo.html_url}" target="_blank">View</a>sayav
      </div>
    `
  })
})

</script>

</body>
</html>
